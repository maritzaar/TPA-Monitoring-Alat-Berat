services:
  # Database Service (Free Tier)
  - type: psql
    name: tpa-monitoring-db
    region: singapore
    plan: free
    databaseName: tpa_monitoring
    user: monitoring_user

  # Web Service
  - type: web
    name: tpa-monitoring-app
    region: singapore
    env: docker
    branch: coba-postgres
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: tpa-monitoring-app
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: tpa-monitoring-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tpa-monitoring-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: tpa-monitoring-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tpa-monitoring-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tpa-monitoring-db
          property: password
